services:
  bot:
    build: .
    image: pravohelp:latest
    container_name: pravohelp-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('api.telegram.org', 443), timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
